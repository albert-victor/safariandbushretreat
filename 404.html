  <style>
    :root {
      --primary-gold: #C6A15B;
      --dark: #0F1115;
      --forest: #1B3A2F;
      --white: #FFFFFF;
      --white-70: rgba(255, 255, 255, 0.7);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--dark);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background-image:
        linear-gradient(135deg, rgba(198, 161, 91, 0.08), transparent 50%),
        linear-gradient(180deg, var(--dark) 0%, var(--forest) 100%);
    }

    .error-page { max-width: 520px; }

    .error-page__code {
      font-family: 'Playfair Display', serif;
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 600;
      color: var(--primary-gold);
      line-height: 1;
      margin-bottom: 1rem;
      opacity: 0.3;
    }

    .error-page__title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      margin-bottom: 1rem;
    }

    .error-page__text {
      font-size: 1rem;
      color: var(--white-70);
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .error-page__btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 2rem;
      background: linear-gradient(135deg, var(--primary-gold), #A8864A);
      color: var(--dark);
      font-size: 0.8125rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 4px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .error-page__btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(198, 161, 91, 0.35);
    }
  </style>
